<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Management Dashboard</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Hệ thống quản lý User & Role theo thời gian thực</p>
            </div>
            <div id="status-indicator" class="badge" style="background: rgba(34, 197, 94, 0.1); color: var(--success);">
                System Connected
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Main Content: User List -->
            <section class="card">
                <div class="card-title">
                    <span>👥</span> Danh sách người dùng
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Người dùng</th>
                                <th>Email</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="user-list">
                            <!-- Data will be loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Sidebar: Add User/Role Form -->
            <aside>
                <div class="card" style="margin-bottom: 2rem;">
                    <div class="card-title"><span>➕</span> Thêm User mới</div>
                    <form id="user-form">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="username" required placeholder="john_doe">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" required>
                        </div>
                        <div class="form-group">
                            <label>Vai trò (Role)</label>
                            <select id="role-select" required>
                                <option value="">Chọn một role...</option>
                            </select>
                        </div>
                        <button type="submit">Tạo người dùng</button>
                    </form>
                </div>

                <div class="card">
                    <div class="card-title"><span>🛡️</span> Thêm Role</div>
                    <form id="role-form">
                        <div class="form-group">
                            <label>Tên Role</label>
                            <input type="text" id="role-name" required placeholder="Editor">
                        </div>
                        <div class="form-group">
                            <label>Mô tả</label>
                            <input type="text" id="role-desc" placeholder="Quyền chỉnh sửa bài viết">
                        </div>
                        <button type="submit" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border);">Lưu Role</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
